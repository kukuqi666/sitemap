<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源导航</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            background-color: #007bff;
            padding: 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        nav .logo {
            font-size: 24px;
            color: #fff;
            font-weight: bold;
            margin-right: 20px;
        }
        nav .search {
            display: flex;
            align-items: center;
        }
        nav .search input {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
            margin-right: 10px;
        }
        nav .search button {
            padding: 5px 10px;
            background-color: #fff;
            color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 100px auto 20px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .card {
            background-color: #fff;
            width: 300px;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .card-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }
        .card-description {
            font-size: 16px;
            margin-bottom: 20px;
            color: #777;
        }
        .card-link {
            text-decoration: none;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .card-link:hover {
            background-color: #0056b3;
        }
        footer {
            background-color: #007bff;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">资源导航</div>
        <div class="search">
            <input type="text" id="searchInput" placeholder="搜索资源...">
            <button onclick="search()">搜索</button>
        </div>
    </nav>

    <div class="container"></div>

    <footer>
        © 2024 资源导航 - 保留所有权利
    </footer>

    <script>
        const resources = [
            {
                title: "文案代码大全",
                description: "最全的文案代码资源库",
                link: "https://kukuqi666.github.io/sitemap/Copywriting"
            },
            {
                title: "QQ浏览器工具",
                description: "便捷的QQ浏览器工具",
                link: "https://kukuqi666.github.io/sitemap/qqbrowsertool"
            },
            {
                title: "Google镜像站",
                description: "Google搜索镜像引擎",
                link: "https://kukuqi666.github.io/sitemap/aisearch"
            },
            {
                title: "my520",
                description: "520表白",
                link: "https://kukuqi666.github.io/sitemap/My520"
            },
            {
                title: "love",
                description: "浪漫爱心",
                link: "https://kukuqi666.github.io/sitemap/love"
            },
            {
                title: "baby",
                description: "送给宝宝的爱心树",
                link: "https://kukuqi666.github.io/sitemap/baby"
            },
            {
                title: "hua",
                description: "送给宝宝的玫瑰花",
                link: "https://kukuqi666.github.io/sitemap/hua"
            },
            {
                title: "xpcheck",
                description: "XP检查工具",
                link: "https://kukuqi666.github.io/sitemap/xpcheck"
            }
        ];

        function displayResources(filteredResources) {
            const container = document.querySelector('.container');
            container.innerHTML = '';
            filteredResources.forEach(resource => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-title">${resource.title}</div>
                    <div class="card-description">${resource.description}</div>
                    <a href="${resource.link}" class="card-link" target="_blank">访问入口</a>
                `;
                container.appendChild(card);
            });
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredResources = resources.filter(resource =>
                resource.title.toLowerCase().includes(query) ||
                resource.description.toLowerCase().includes(query)
            );
            displayResources(filteredResources);
        }

        window.onload = function() {
            displayResources(resources);
        };
    </script>

</body>
</html>
